<!DOCTYPE html>
<html>
<head>
    <title>Elevator Sim</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            padding: 0;
        }

        #building {
            border: 2px solid black;
            display: flex;
            flex-direction: column-reverse;
            margin: 5px;
        }

        .floor {
            display: flex;
            align-items: center;
            height: 50px;
            border-top: 1px solid #ccc;
        }

        .label {
            width: 40px;
            text-align: right;
            margin-right: 10px;
        }

        .shaft {
            width: 80px;
            height: 40px;
            border: 1px solid #aaa;
            margin: 5px;
            position: relative;
        }

        .elevator {
            width: 100%;
            height: 100%;
            background-color: #4A90E2;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        .passenger {
            width: 75px;
            height: 30px;
            background-color: gold;
            margin-left: 5px;
            justify-content: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        .inside {
            font-weight: bold;
        }
        .arrived {
            color: #4A90E2;
            opacity: 0.8;
            text-decoration: line-through;
        }
    </style>
</head>

<body>

<div style="display: flex; justify-content: center; gap: 50px;">
    <div id="building"></div>

    <div id="stats" style="width: 450px;">
        <h2>Stats</h2>
        <div><h3 id="step">Step 0</h3></div>
        <div id="elevator-stats"></div>
        <div id="passenger-stats"></div>
    </div>
</div>

<script>
const MAX_FLOOR = 10;

async function update() {
    const res = await fetch("/state");
    const data = await res.json();

    const building = document.getElementById("building");
    building.innerHTML = "";

    // --- BUILDING VIEW ---
    for (let floor = 0; floor <= MAX_FLOOR; floor++) {
        let row = document.createElement("div");
        row.className = "floor";

        let label = document.createElement("div");
        label.className = "label";
        label.innerText = floor;
        row.appendChild(label);

        data.elevators.forEach(e => {
            let shaft = document.createElement("div");
            shaft.className = "shaft";

            if (e.floor === floor) {
                let el = document.createElement("div");
                el.className = "elevator";

                let arrow = "𝗓";
                if (e.direction === "up") arrow = "↑";
                if (e.direction === "down") arrow = "↓";

                el.innerText = e.label + arrow + ` (${e.numPassengers}p)`;
                shaft.appendChild(el);
            }

            row.appendChild(shaft);
        });

        data.passengers.forEach(p => {
            if (p.floor === floor && p.status === "waiting") {
                let person = document.createElement("div");
                person.className = "passenger";


                let parrow = "𝗓";
                if (p.direction === "up") parrow = "↑";
                if (p.direction === "down") parrow = "↓";

                person.innerText = p.name + ` (${p.targetFloor}f)` + parrow;
                row.appendChild(person);
            }
        });

        building.appendChild(row);
    }

    // --- STATS ---
    document.getElementById("step").innerText = 
    "Step " + data.steps;

    const elevatorStats = document.getElementById("elevator-stats");
    elevatorStats.innerHTML = "<h3>Elevators</h3>";
    data.elevators.forEach(e => {
        let div = document.createElement("div");
        div.innerText = `Elevator ${e.label}: Floor ${e.floor}, Dir: ${e.direction}, Floors to Go: ${e.floorsToGo}`;
        elevatorStats.appendChild(div);
    });

    const passengerStats = document.getElementById("passenger-stats");
    passengerStats.innerHTML = "<h3>Passengers</h3>";
    data.passengers.forEach(p => {
        let div = document.createElement("div");
        div.innerText = `${p.name} (${p.elevator}): Floor ${p.floor}, Target: ${p.targetFloor}, Status: ${p.status}, Dir: ${p.direction}`;
        passengerStats.appendChild(div);
        if (p.status === "in elevator") {
            div.classList.add("inside");
        }
        if (p.status === "at target floor") {
            div.classList.add("arrived");
        }
    });
}

setInterval(update, 500);
</script>

</body>
</html>
